server.port=${POS_API_PORT:8080}

spring.datasource.url=${POS_DB_URL:jdbc:mysql://localhost:3306/supermarket_pos_api?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${POS_DB_USER:root}
spring.datasource.password=${POS_DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=${POS_JWT_SECRET:SuperMarketPosJwtSecretKeyChangeMeAtLeast32BytesLong}
security.jwt.expiration-ms=${POS_JWT_EXPIRATION_MS:86400000}

pos.bootstrap.admin.username=${POS_BOOTSTRAP_ADMIN_USER:admin}
pos.bootstrap.admin.password=${POS_BOOTSTRAP_ADMIN_PASS:admin123}
pos.bootstrap.owner.username=${POS_BOOTSTRAP_OWNER_USER:owner}
pos.bootstrap.owner.password=${POS_BOOTSTRAP_OWNER_PASS:1234}
pos.bootstrap.main-branch.code=${POS_BOOTSTRAP_MAIN_BRANCH_CODE:MAIN}
pos.bootstrap.main-branch.name=${POS_BOOTSTRAP_MAIN_BRANCH_NAME:Main Branch}
